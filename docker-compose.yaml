services:
  ecm_max_bot:
    image: ecm_max_bot
    build:
      context: .
    container_name: ecm_max_bot
    env_file:
      - .env
    command: ["python", "main.py"]
    restart: always
    volumes:
     - ./temp/:/src/temp
    networks:
      - default
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: ecm_bot_redis
    restart: always
    networks:
      - default

networks:
  default:
    name: ecm_bot_network
    driver: bridge